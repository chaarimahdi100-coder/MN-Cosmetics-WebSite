name: CI/CD - MN Cosmetics

# ============================================================
# Déclencheurs du workflow
# ============================================================
on:
  push:
    branches:
      - main
      - develop
      - 'feature-*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  # ==========================================================
  # ÉTAPE 1 — TESTS : Validation des fichiers HTML/CSS
  # ==========================================================
  test:
    name: "Test and Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Verification de la structure du projet
        run: |
          exit 1
      - name: Validation des fichiers HTML
        run: |
          echo "=== Validation HTML ==="
          # Vérifier index.html
          if grep -qi "<!DOCTYPE html>" "index.html"; then
            echo "OK index.html : DOCTYPE present"
          else
            echo "WARN index.html : DOCTYPE manquant"
          fi

          # Vérifier les pages dans html/
          for html_file in html/page1.html html/page2.html html/page3.html; do
            if [ -f "$html_file" ]; then
              if grep -qi "<html" "$html_file" && grep -qi "</html>" "$html_file"; then
                echo "OK $html_file : balises html correctes"
              else
                echo "ERREUR $html_file : balises html incorrectes"
                exit 1
              fi
            else
              echo "WARN $html_file non trouve"
            fi
          done
          echo "Validation HTML reussie."

      - name: Verification des fichiers CSS
        run: |
          echo "=== Vérification CSS ==="
          css_count=$(find ./css -name "*.css" 2>/dev/null | wc -l)
          echo "Nombre de fichiers CSS : $css_count"
          if [ "$css_count" -ge 1 ]; then
            echo "OK fichiers CSS presents"
          else
            echo "WARN aucun fichier CSS trouve dans ./css"
          fi

      - name: Validation du Dockerfile
        run: |
          echo "=== Validation Dockerfile ==="
          if grep -q "FROM nginx:alpine" Dockerfile; then
            echo "OK image de base nginx:alpine"
          else
            echo "ERREUR image de base incorrecte"
            exit 1
          fi
          if grep -q "EXPOSE" Dockerfile; then
            echo "OK port expose dans le Dockerfile"
          else
            echo "ERREUR pas de EXPOSE dans le Dockerfile"
            exit 1
          fi
          echo "Validation Dockerfile reussie."

  # ==========================================================
  # ÉTAPE 2 — BUILD : Construction de l'image Docker
  # ==========================================================
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construction de l image Docker
        run: |
          echo "=== Build de l'image mn-cosmetics:latest ==="
          docker build \
            --tag mn-cosmetics:latest \
            --tag mn-cosmetics:${{ github.sha }} \
            .
          echo "Image construite avec succes !"

      - name: Test du conteneur
        run: |
          echo "=== Test du conteneur ==="
          docker run -d \
            --name mn-cosmetics-test \
            -p 8080:80 \
            mn-cosmetics:latest

          echo "Attente du démarrage (5s)..."
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
          echo "Code HTTP recu : $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "OK le site repond correctement (HTTP $HTTP_CODE)"
          else
            echo "ERREUR le site ne repond pas (HTTP $HTTP_CODE)"
            docker logs mn-cosmetics-test
            exit 1
          fi

          docker stop mn-cosmetics-test
          docker rm mn-cosmetics-test

      - name: Informations sur l image
        run: |
          docker images mn-cosmetics:latest
          echo "Build Docker termine avec succes."

      - name: Export de l image
        run: |
          docker save mn-cosmetics:latest | gzip > mn-cosmetics-image.tar.gz

      - name: Upload artifact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: mn-cosmetics-image.tar.gz
          retention-days: 7

  # ==========================================================
  # ÉTAPE 3 (BONUS) — SECURITY SCAN avec Trivy
  # ==========================================================
  security-scan:
    name: "Security Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Reconstruction de l image pour le scan
        run: docker build --tag mn-cosmetics:scan .

      - name: Scan de vulnerabilites avec Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mn-cosmetics:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload resultats Trivy vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-docker-scan'

      - name: Rapport texte Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mn-cosmetics:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
