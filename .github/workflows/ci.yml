name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validation HTML/CSS/JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les fichiers essentiels
        run: |
          python - <<'PY'
          import pathlib, sys
          files = [
            'page1.html',
            'page2.html',
            'page3.html',
            'css/page.css',
            'css/page2.css',
            'js/page.js',
            'Dockerfile',
            'docker-compose.yml'
          ]
          missing = [f for f in files if not pathlib.Path(f).is_file()]
          if missing:
              print('Fichiers manquants:', missing)
              sys.exit(1)
          print('Validation minimale réussie : tous les fichiers sont présents.')
          PY

  build:
    name: Construire l'image Docker
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer Buildx
        uses: docker/setup-buildx-action@v3
      - name: Construire l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mn-cosmetics:ci
          outputs: type=docker,dest=/tmp/image.tar
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  security:
    name: Scanner de sécurité
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Télécharger l'image Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Installer Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y
      - name: Scanner l'image Docker avec Trivy
        run: trivy image --input /tmp/image.tar --exit-code 0 --severity HIGH,CRITICAL --format sarif --output trivy-results.sarif
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
